services:
  jasper:
    build:
      context: .
      args:
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
    container_name: jasper
    ports:
      - "4278:3000"
    env_file:
      - .env
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    restart: unless-stopped
    volumes:
      - ./prisma/prod.db:/app/prisma/prod.db
